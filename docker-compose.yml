name: portfolio-agent

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: portfolio-agent:local

services:
  api:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LITELLM_PROXY_URL: http://litellm:4000
      LITELLM_MODEL: ${API_LITELLM_MODEL:-gemini/gemini-2.5-flash-lite}
      LITELLM_EMBEDDING_MODEL: ${LITELLM_EMBEDDING_MODEL:-gemini/gemini-embedding-001}
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      litellm:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm_password}
    ports:
      - "5432:5432"
    volumes:
      - ./data/litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD:-litellm_password}@postgres:5432/litellm
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-local-dev-salt-change-me}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-admin}
    command: ["litellm", "--config", "/app/litellm_config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5).read()",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
