name: portfolio-agent

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-agent:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LITELLM_MODEL: ${LITELLM_MODEL:-gemini/gemini-2.5-flash-lite}
      LITELLM_EMBEDDING_MODEL: ${LITELLM_EMBEDDING_MODEL:-gemini/gemini-embedding-001}
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
