name: Backend
run-name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend.yml"

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ankoay-feno/opsynca-ai/api
  CONTAINER_APP_NAME: ca-portfolio-api-opsynca-ai
  RESOURCE_GROUP: rg-opsynca-ai

jobs:
  build:
    name: Build (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: fastembed-minilm-l12-multilingual-v1

      - name: Pre-download embedding model (baked into image)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          uv sync --frozen --extra local-embed
          for i in 1 2 3 4 5; do
            uv run python -c "from fastembed import TextEmbedding; TextEmbedding(model_name='sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2', cache_dir='.fastembed_cache')" && break
            echo "download attempt $i failed, retry in 20s..."; sleep 20
            [ "$i" = "5" ] && { echo "::error::model download failed"; exit 1; }
          done

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: fastembed-minilm-l12-multilingual-v1

      - name: Pre-download embedding model (baked into image)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          uv sync --frozen --extra local-embed
          for i in 1 2 3 4 5; do
            uv run python -c "from fastembed import TextEmbedding; TextEmbedding(model_name='sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2', cache_dir='.fastembed_cache')" && break
            echo "download attempt $i failed, retry in 20s..."; sleep 20
            [ "$i" = "5" ] && { echo "::error::model download failed"; exit 1; }
          done

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$REGISTRY/$IMAGE_NAME:${{ github.sha }}"
