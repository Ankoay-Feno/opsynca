name: Terraform
run-name: Terraform CI/CD

on:

  push:
    branches: [main]
    paths:
      - "iac/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: iac
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  plan:
    name: Plan
    
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore env_variables JSON files
        env:
          BACKEND_ENV_JSON: ${{ secrets.BACKEND_ENV_JSON }}
          FRONTEND_ENV_JSON: ${{ secrets.FRONTEND_ENV_JSON }}
        run: |
          mkdir -p env_variables/backend env_variables/frontend
          printf '%s' "$BACKEND_ENV_JSON" > env_variables/backend/backend_env.json
          printf '%s' "$FRONTEND_ENV_JSON" > env_variables/frontend/frontend_env.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT


      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore env_variables JSON files
        env:
          BACKEND_ENV_JSON: ${{ secrets.BACKEND_ENV_JSON }}
          FRONTEND_ENV_JSON: ${{ secrets.FRONTEND_ENV_JSON }}
        run: |
          mkdir -p env_variables/backend env_variables/frontend
          printf '%s' "$BACKEND_ENV_JSON" > env_variables/backend/backend_env.json
          printf '%s' "$FRONTEND_ENV_JSON" > env_variables/frontend/frontend_env.json

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
