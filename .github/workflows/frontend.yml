name: Frontend
run-name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  CONTAINER_APP_NAME: ca-portfolio-api-opsynca-ai
  RESOURCE_GROUP: rg-opsynca-ai

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # --- Précompute des embeddings KB avec le modèle LOCAL (jamais Gemini) ---
      # On lance le backend en mode local dans le runner et on génère
      # frontend/public/portfolio-index.json. Vite le copiera dans dist/ au build.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: fastembed-minilm-l12-multilingual-v1

      - name: Install backend with local embeddings
        run: uv sync --frozen --extra local-embed

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Precompute KB embeddings (local model)
        env:
          EMBEDDING_BACKEND: local
          FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
          LOCAL_EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          # Pré-télécharge le modèle (retries : HF rate-limite l'anonyme en CI).
          for i in 1 2 3 4 5; do
            uv run python -c "from fastembed import TextEmbedding; TextEmbedding(model_name='$LOCAL_EMBEDDING_MODEL', cache_dir='$FASTEMBED_CACHE_DIR')" && break
            echo "download attempt $i failed, retry in 20s..."; sleep 20
            [ "$i" = "5" ] && { echo "::error::model download failed"; exit 1; }
          done
          # Backend en mode embedding local, en arrière-plan.
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          backend_pid=$!
          # Attend que /health réponde (max ~120s).
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/ >/dev/null && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/ >/dev/null || { echo "::error::le backend ne démarre pas"; exit 1; }
          # Génère l'artefact, embeddé par le modèle local (384d).
          ( cd frontend && PRECOMPUTE_API_BASE=http://127.0.0.1:8000 npm run precompute )
          kill "$backend_pid" 2>/dev/null || true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve backend API URL from Container App
        id: api
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          if [ -z "$FQDN" ]; then
            echo "::error::Could not resolve Container App FQDN. Check the app has ingress enabled."
            exit 1
          fi
          API_URL="https://$FQDN"
          echo "Resolved API URL: $API_URL"
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_BASE_URL: ${{ steps.api.outputs.url }}
          VITE_APP_ENV: production
