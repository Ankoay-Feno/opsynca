name: Frontend
run-name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  CONTAINER_APP_NAME: ca-portfolio-api-opsynca-ai
  RESOURCE_GROUP: rg-opsynca-ai

jobs:
  build_and_deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve backend API URL from Container App
        id: api
        run: |
          set -euo pipefail
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          if [ -z "$FQDN" ]; then
            echo "::error::Could not resolve Container App FQDN. Check the app has ingress enabled."
            exit 1
          fi
          API_URL="https://$FQDN"
          echo "Resolved API URL: $API_URL"
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "dist"
        env:
          VITE_API_BASE_URL: ${{ steps.api.outputs.url }}
          VITE_APP_ENV: production
