<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio d'Anjara Feno RANDRIANIHARISOA — Cloud & DevOps Engineer spécialisé AWS, Terraform, CI/CD et observabilité."
    />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="icon" type="image/png" href="/profile.png" />
    <link rel="apple-touch-icon" href="/profile.png" />
    <title>Ankoay Feno — Cloud & DevOps Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-rag.theme");
          var pref = stored === "light" || stored === "dark" ? stored : "system";
          var theme = pref === "system"
            ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark")
            : pref;
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
